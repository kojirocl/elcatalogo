<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <style>
        [x-cloak] { display: none !important; }
        .demo-box { padding: 1rem; margin: 1rem 0; border: 1px solid #e2e8f0; border-radius: 0.5rem; }
        button { margin: 0 0.25rem; padding: 0.5rem 1rem; border-radius: 0.375rem; border: 1px solid #cbd5e0; }
    </style>


</head>
<body>
    
 <!-- DROPDOWN - Usando Alpine.data() -->
    <div x-data="dropdown">
        <button @click="toggle">Abrir Dropdown</button>
        <div x-show="open" style="border:1px solid #ccc; padding:10px; margin-top:5px;">
            Contenido del dropdown
        </div>
    </div>

    <hr class="my-4">

    <!-- COUNTER 1 - Usando Alpine.data() -->
    <div x-data="counter(0)">
        <button @click="increment">+</button>
        <span x-text="count"></span>
        <button @click="decrement">-</button>
        <button @click="reset">Reset</button>
    </div>

    <!-- COUNTER 2 - Mismo componente, diferente valor inicial -->
    <div x-data="counter(5)">
        <button @click="increment">+</button>
        <span x-text="count"></span>
        <button @click="decrement">-</button>
        <button @click="reset">Reset</button>
    </div>

<script>
    document.addEventListener('alpine:init', () => {
        // ✅ Registro correcto
        Alpine.data('dropdown', () => ({ open: false, toggle() { this.open = !this.open } }))
        Alpine.data('counter', (init) => ({ 
            count: init, 
            increment() { 
                this.count++ 
            },
            decrement(){
                this.count--
            },
            reset(){
                this.count = init
            }
        }))
    })
</script>

</body>
</html>
