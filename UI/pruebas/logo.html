<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    

    <h1 style="font-family: 'Playfair Display', serif; font-weight: 700; color: #000000; position: relative; display: inline-block;">
  El Catálogo
  <span style="position: absolute; bottom: -8px; left: 0; width: 100%; height: 2px; background: #6b46c1;"></span>
</h1>


<div style="width: 100px; height: 100px; border: 2px solid #000; border-radius: 50%; background: #6b46c1; display: flex; align-items: center; justify-content: center;">
  <span style="font-family: 'Arial', sans-serif; font-weight: bold; color: white; font-size: 24px;">EC</span>
</div>

<svg width="200" height="80" viewBox="0 0 200 80" xmlns="http://www.w3.org/2000/svg">
  <rect x="10" y="20" width="40" height="40" fill="none" stroke="#6b46c1" stroke-width="2" rx="8"/>
  <rect x="15" y="25" width="30" height="30" fill="none" stroke="#6b46c1" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="70" y="50" font-family="Playfair Display" font-size="24" fill="#000000">El Catálogo</text>
</svg>

<svg width="200" height="80" viewBox="0 0 200 80" xmlns="http://www.w3.org/2000/svg">
  <rect x="10" y="20" width="40" height="30" fill="#6b46c1" rx="6"/>
  <path d="M10 25 L30 40 L50 25" fill="none" stroke="#ffffff" stroke-width="2"/>
  <text x="70" y="45" font-family="Arial" font-size="22" fill="#000000">El <tspan fill="#6b46c1">Catálogo</tspan></text>
</svg>

<svg width="300" height="100" viewBox="0 0 300 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Ícono de lupa con estrella (morado/negro) -->
  <circle cx="40" cy="50" r="20" fill="none" stroke="#6b46c1" stroke-width="3"/>
  <path d="M55 65 L75 85" stroke="#6b46c1" stroke-width="3" stroke-linecap="round"/>
  <path d="M40 50 L50 40 M40 50 L30 40 M40 50 L50 60 M40 50 L30 60" stroke="#6b46c1" stroke-width="2"/>
  <!-- Texto "El Catálogo" (negro con subrayado morado) -->
  <text x="90" y="60" font-family="'Playfair Display', serif" font-size="36" fill="#000000" font-weight="700">
    El Catálogo
  </text>
  <line x1="90" y1="65" x2="250" y2="65" stroke="#6b46c1" stroke-width="2"/>
</svg>

<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <circle cx="32" cy="32" r="28" fill="none" stroke="#6b46c1" stroke-width="4"/>
  <path d="M45 45 L55 55" stroke="#6b46c1" stroke-width="4" stroke-linecap="round"/>
  <circle cx="32" cy="32" r="10" fill="none" stroke="#6b46c1" stroke-width="4"/>
</svg>


<style>
    svg path {
  transition: stroke 0.3s;
}
svg:hover path {
  stroke: #9F7AEA; /* Cambia el color al pasar el mouse */
}
</style>
</body>
</html>
