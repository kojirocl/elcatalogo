[routes]
#     FRONTEND
GET / = Controllers\Publico\Inicio->inicio
GET /perfiles = Publico\Perfil->inicio
GET /perfiles/@idPerfil = Publico\Perfil->verPerfil

POST /perfiles = Api\Perfiles->get

GET /salir = Privado\salir->inicio
GET /inicio/cargando = Publico\Inicio->cargando
GET /cargar-comentarios = Publico\Perfil->cargar_comentarios

GET /login = Publico\Login->inicio
POST /login = Publico\Login->authenticate

GET /recuperar = Elcatalogo->en_construccion

GET /registro = Publico\Registro->inicio
POST /registro = Publico\Registro->procesar_registro

GET /validar = Publico\Registro->confirmar_mail

GET|POST /verificar = Publico\Registro->validar_mail

GET /contacto = Publico\Contacto->inicio

GET /captcha = Imagenes->img_seguridad

GET /whatsapp/@id = Publico\Perfil->contacto

; API de carrusel (me gusta)
POST /api/like/toggle = Api\ApiLikesSimple->toggle


; API de comentarios
POST /api/comentarios = ApiComentarios->crear
PUT /api/comentarios/@id = ApiComentarios->actualizar
DELETE /api/comentarios/@id = ApiComentarios->eliminar


#API SECTION
POST /api/comentar = Api->comentar
POST /api/me-gusta = Api->me_gusta
POST /actualizar-comentario/@id = Api->actualizar_comentario
POST /nuevo-comentario/@id = Api->nuevo_comentario

#API
GET /api/usuarios = Api->filtrar_usuarios
GET /api/comentarios/@idUserOrigen/@idUserDestino = Api->mi_comentario


GET /consulta/logueado = Elcatalogo->revisaSiConectado

GET /miniaturas = Imagenes->generar_todas_miniaturas
GET /generar_perfiles = Imagenes->generar_perfiles


