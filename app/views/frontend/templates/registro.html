
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
      <div class="card shadow-lg border-0 rounded-4 p-4">
        <h3 class="fw-bold mb-3" style="color: #8e0fc9;">Crear tu cuenta</h3>
        <p class="text-muted mb-4">Completa tus datos para comenzar</p>

        <form method="POST">
          <input type="hidden" name="csrf" value="{{ @CSRF }}">

          <!-- Email -->
          <div class="mb-4">
            <label class="form-label">Correo electrónico</label>
            <input type="email" class="form-control" name="dato[]" value="{{ isset(@email)? @email : '' }}" required>
          </div>

          <!-- Password con toggle -->
          <div class="mb-4" x-data="{ show: false }">
            <label class="form-label">Contraseña</label>
            <div class="input-group">
              <input :type="show ? 'text' : 'password'" class="form-control" name="dato[]" minlength="8" required>
              <button type="button" class="btn btn-outline-secondary" @click="show = !show">
                <i :class="show ? 'bi bi-eye-slash' : 'bi bi-eye'"></i>
              </button>
            </div>
          </div>

          <!-- Captcha -->
          <div class="mb-4">
            <label class="form-label">Código de seguridad</label>
            <div class="d-flex align-items-center gap-3">
              <img src="/captcha" alt="captcha" class="rounded border"/>
              <input type="text" class="form-control" name="dato[]" placeholder="Ingresa el código">
            </div>
          </div>

          <!-- Botón -->
          <button type="submit" class="btn w-100" style="background-color:  #8e0fc9; color: white;">
            <i class="bi bi-person-plus"></i> Registrarme
          </button>
        </form>

        <!-- Links -->
        <div class="text-center mt-4">
          <a href="/login" class="text-decoration-none" style="color: #8e0fc9;">¿Ya tienes cuenta? Inicia sesión</a>
        </div>
      </div>
    </div>
  </div>
</div>
