

<div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 g-3">
    <repeat group="{{ @medios }}" value="{{ @medio }}">
    <div class="col">
      <div class="card shadow-sm">
        <img src="{{ @medio.ubicacion }}" class="bd-placeholder-img card-img-top img-adaptable" width="100%" height="225"  focusable="false" />
        <div class="card-body">
          <div class="d-flex justify-content-center">
            <div class="btn-group">
              
              <button class="btn btn-sm btn-outline-primary btn-me-gusta {{ @estados.habilitado }}" role="button" id="{{ @medio.id }}" type="button"><i id="{{ @medio.id }}" class="corazones bi {{ @medio.si_me_gusta?'bi-heart-fill':'bi-heart' }}"></i> <dato id="{{ @medio.id }}" class="me_gusta">{{ @medio.total_me_gusta }}</dato> me gusta</button>

          </div>
        </div>
      </div>
    </div>
