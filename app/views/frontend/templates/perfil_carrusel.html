<check if="{{ isset(@infoPerfil['medios']) }}">
    <true>
        <div id="carruselslide" class="carousel slide position-relative">
            <div class="carousel-inner ratio ratio-16x9">
                <repeat group="{{ @infoPerfil['medios'] }}" value="{{ @medio }}" counter="{{ @ctr }}">
                    <div class="carousel-item {{ @ctr==1?'active':'' }}" 
                        x-data="likeSystem({{ @medio.id }}, {{ @medio.si_me_gusta ? 'true' : 'false' }}, {{ @medio.total_me_gusta }})">
                        
                        <div class="position-relative h-100">
                            <img src="{{ 'uploads/carrusel/'.@medio.ubicacion }}" 
                                 class="d-block w-100 h-100 object-fit-contain" />
                            
                            <!-- Botón de Me gusta -->
                            <div class="position-absolute bottom-0 start-50 translate-middle-x mb-4 z-3">

                                <!-- Caso: visitante es dueño del perfil -->
                                <check if="{{ @infoPerfil['esMiPerfil'] }}">
                                    <true>
                                        <button class="btn btn-sm btn-outline-secondary" disabled>
                                            <i class="bi bi-heart"></i>
                                            <span x-text="total"></span> me gusta
                                        </button>
                                    </true>
                                    <false>
                                        <!-- Caso: no es su perfil -->
                                        <check if="{{ isset(@SESSION.usuario) }}">
                                            <true>
                                                <!-- Usuario logueado puede dar like -->
                                                <button @click="toggle()" 
                                                        :class="`btn btn-sm ${meGusta ? 'btn-primary' : 'btn-outline-primary'}`">
                                                    <i :class="`bi ${meGusta ? 'bi-heart-fill' : 'bi-heart'}`"></i>
                                                    <span x-text="total"></span> me gusta
                                                </button>
                                            </true>
                                            <false>
                                                <!-- Usuario no logueado: solo visualización -->
                                                <button class="btn btn-sm btn-outline-secondary" disabled>
                                                    <i class="bi bi-heart"></i>
                                                    <span x-text="total"></span> me gusta
                                                </button>
                                            </false>
                                        </check>
                                    </false>
                                </check>
                            </div>
                        </div>
                    </div>
                </repeat>
            </div>
            
            <!-- Controles del carrusel -->
            <button class="carousel-control-prev" type="button" data-bs-target="#carruselslide" data-bs-slide="prev">
                <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                <span class="visually-hidden">Previous</span>
            </button>
            <button class="carousel-control-next" type="button" data-bs-target="#carruselslide" data-bs-slide="next">
                <span class="carousel-control-next-icon" aria-hidden="true"></span>
                <span class="visually-hidden">Next</span>
            </button>
        </div>

        <style>
        .carousel-control-prev, .carousel-control-next {
            z-index: 2; /* Menor que el botón (z-3) */
        }
        .object-fit-contain {
            object-position: center;
        }
        </style>
    </true>
    <false>
        <div class="alert alert-secondary" role="alert">
            <img src="img/IMG-20250826-WA0001_2.png" width="50%" alt="">
            <p><i class="bi bi-info-circle-fill"></i> no hay medios cargados aún...</p>
        </div>         
    </false>
</check>
